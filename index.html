<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dutch Reader">
<title>Dutch Reader</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #0a0a0a;
    --paper: #f5f0e8;
    --red: #c8102e;
    --blue: #003087;
    --gold: #d4a017;
    --mid: #6b6560;
    --light: #e8e2d9;
    --white: #faf8f4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ---- SCREENS ---- */
  .screen { display: none; min-height: 100vh; min-height: 100dvh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ---- SETUP SCREEN ---- */
  #setup {
    background: var(--ink);
    align-items: stretch;
    position: relative;
    overflow: hidden;
  }

  #setup::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 6px;
    height: 100%;
    background: var(--red);
  }

  #setup::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 6px;
    height: 100%;
    background: var(--blue);
  }

  .setup-inner {
    padding: 56px 40px 48px;
    display: flex;
    flex-direction: column;
    gap: 0;
    flex: 1;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 32px;
  }

  .setup-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 10vw, 64px);
    font-weight: 900;
    line-height: 0.95;
    color: var(--white);
    margin-bottom: 8px;
  }

  .setup-title span {
    color: var(--red);
    display: block;
  }

  .setup-sub {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: #888;
    letter-spacing: 0.02em;
    margin-bottom: 52px;
    line-height: 1.6;
  }

  .field-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    display: block;
  }

  .field-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px;
    padding: 14px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .field-input:focus {
    border-color: var(--gold);
  }

  .field-input::placeholder {
    color: rgba(255,255,255,0.2);
  }

  .field-hint {
    font-size: 11px;
    color: #555;
    margin-top: 8px;
    line-height: 1.5;
  }

  .field-hint a {
    color: var(--gold);
    text-decoration: none;
  }

  .spacer { flex: 1; }

  .btn-primary {
    width: 100%;
    padding: 18px 24px;
    background: var(--red);
    color: var(--white);
    border: none;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-primary:active { transform: scale(0.98); background: #a50d25; }
  .btn-primary:disabled { background: #444; color: #666; cursor: not-allowed; }

  /* ---- UPLOAD SCREEN ---- */
  #upload {
    background: var(--paper);
    align-items: stretch;
  }

  .upload-header {
    background: var(--ink);
    padding: 20px 24px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
  }

  .upload-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, var(--red) 0%, var(--blue) 100%);
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    flex: 1;
  }

  .settings-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    padding: 8px 12px;
    color: #888;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .upload-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 28px;
    gap: 24px;
  }

  .drop-zone {
    width: 100%;
    border: 2px dashed rgba(10,10,10,0.2);
    border-radius: 8px;
    padding: 48px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--white);
    -webkit-tap-highlight-color: transparent;
  }

  .drop-zone.drag-over {
    border-color: var(--red);
    background: rgba(200, 16, 46, 0.04);
  }

  .drop-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--white);
    font-size: 26px;
  }

  .drop-label {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    text-align: center;
  }

  .drop-sub {
    font-size: 12px;
    color: var(--mid);
    text-align: center;
    line-height: 1.5;
  }

  #file-input { display: none; }

  .preview-wrap {
    width: 100%;
    display: none;
    flex-direction: column;
    gap: 16px;
  }

  .preview-wrap.visible { display: flex; }

  .preview-img {
    width: 100%;
    max-height: 220px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--light);
  }

  .preview-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--mid);
    text-align: center;
  }

  .upload-actions {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn-secondary {
    width: 100%;
    padding: 14px 24px;
    background: transparent;
    color: var(--ink);
    border: 1px solid rgba(10,10,10,0.2);
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-secondary:active { background: var(--light); }

  /* ---- PROCESSING SCREEN ---- */
  #processing {
    background: var(--ink);
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 40px;
  }

  .processing-animation {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse 1.4s ease-in-out infinite;
  }

  .dot:nth-child(2) { background: var(--gold); animation-delay: 0.2s; }
  .dot:nth-child(3) { background: var(--blue); animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1.1); opacity: 1; }
  }

  .processing-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #666;
  }

  .processing-step {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--white);
    text-align: center;
    min-height: 28px;
    transition: opacity 0.3s;
  }

  /* ---- READER SCREEN ---- */
  #reader {
    background: var(--paper);
    align-items: stretch;
  }

  .reader-header {
    background: var(--ink);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .reader-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, var(--red) 0%, var(--blue) 100%);
  }

  .progress-bar-wrap {
    position: absolute;
    bottom: -3px;
    left: 0;
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.08);
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.4s ease;
  }

  .reader-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #888;
  }

  .reader-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
  }

  .upload-new-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    padding: 6px 10px;
    color: #888;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    text-transform: uppercase;
  }

  .sentence-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px 120px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* Phase indicator */
  .phase-indicator {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .phase-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--light);
    transition: background 0.3s;
  }

  .phase-dot.active { background: var(--red); }
  .phase-dot.done { background: var(--gold); }

  .phase-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--mid);
    text-transform: uppercase;
  }

  /* English card */
  .card {
    background: var(--white);
    border-radius: 8px;
    padding: 20px 20px;
    border: 1px solid var(--light);
    position: relative;
    overflow: hidden;
  }

  .card.dutch-card {
    background: var(--ink);
    border: none;
  }

  .card-lang {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 10px;
  }

  .dutch-card .card-lang {
    color: #666;
  }

  .card-flag {
    position: absolute;
    top: 0;
    right: 0;
    width: 4px;
    height: 100%;
    background: var(--blue);
  }

  .dutch-card .card-flag {
    background: linear-gradient(180deg, var(--red) 0%, var(--red) 33%, var(--white) 33%, var(--white) 66%, var(--blue) 66%);
  }

  .card-text {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 16px;
    line-height: 1.65;
    color: var(--ink);
    font-weight: 400;
  }

  .dutch-card .card-text {
    color: var(--white);
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.01em;
  }

  /* Listen button */
  .listen-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: var(--blue);
    color: var(--white);
    border: none;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.2s, transform 0.1s;
  }

  .listen-btn:active { transform: scale(0.97); }
  .listen-btn.speaking { background: var(--gold); }

  .listen-icon { font-size: 16px; }

  /* Breakdown accordion */
  .breakdown-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--light);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .breakdown-toggle-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
  }

  .breakdown-arrow {
    font-size: 14px;
    color: var(--mid);
    transition: transform 0.25s;
  }

  .breakdown-arrow.open { transform: rotate(180deg); }

  .breakdown-body {
    display: none;
    flex-direction: column;
    gap: 0;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--light);
    margin-top: -8px;
    background: var(--white);
  }

  .breakdown-body.open { display: flex; }

  .word-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border-bottom: 1px solid var(--light);
    padding: 12px 20px;
    align-items: start;
  }

  .word-row:last-child { border-bottom: none; }

  .word-dutch {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }

  .word-info {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .word-english {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    color: var(--ink);
  }

  .word-note {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--mid);
  }

  /* Grammar note */
  .grammar-card {
    background: var(--blue);
    border-radius: 8px;
    padding: 16px 20px;
  }

  .grammar-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }

  .grammar-text {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    color: var(--white);
    line-height: 1.6;
    font-weight: 300;
  }

  /* Nav */
  .nav-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--ink);
    padding: 12px 20px 24px;
    display: none;
    gap: 12px;
    border-top: 3px solid var(--red);
    z-index: 20;
  }

  .nav-bar.visible { display: flex; }

  .nav-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .nav-btn:active { transform: scale(0.97); }

  .nav-prev {
    background: rgba(255,255,255,0.06);
    color: #888;
  }

  .nav-next {
    background: var(--red);
    color: var(--white);
    flex: 2;
  }

  .nav-next:disabled {
    background: var(--gold);
    color: var(--ink);
  }

  /* ---- EMPTY / ERROR ---- */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
    padding: 40px;
    text-align: center;
  }

  .error-msg {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    color: var(--red);
    text-align: center;
    padding: 16px;
    background: rgba(200, 16, 46, 0.08);
    border-radius: 6px;
    width: 100%;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-up {
    animation: fadeUp 0.4s ease forwards;
  }

  .fade-up-delay-1 { animation-delay: 0.1s; opacity: 0; }
  .fade-up-delay-2 { animation-delay: 0.2s; opacity: 0; }
  .fade-up-delay-3 { animation-delay: 0.35s; opacity: 0; }
  .fade-up-delay-4 { animation-delay: 0.5s; opacity: 0; }

  /* Skeleton loader */
  .skeleton {
    background: linear-gradient(90deg, var(--light) 25%, var(--paper) 50%, var(--light) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    height: 16px;
    width: 100%;
  }

  @keyframes shimmer {
    from { background-position: 200% 0; }
    to { background-position: -200% 0; }
  }
</style>
</head>
<body>

<!-- SCREEN 1: API KEY SETUP -->
<div id="setup" class="screen active">
  <div class="setup-inner">
    <div class="brand">Dutch Reader</div>
    <div class="setup-title">Lees<span>& Leer</span></div>
    <div class="setup-sub">Read Dutch books.<br>Understand every sentence.</div>

    <label class="field-label" for="api-key-input">Anthropic API Key</label>
    <input
      id="api-key-input"
      class="field-input"
      type="password"
      placeholder="sk-ant-..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
    >
    <div class="field-hint">
      Your key stays on this device only.<br>
      Get one at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
    </div>

    <div class="spacer"></div>

    <button class="btn-primary" id="setup-continue">Begin Reading</button>
  </div>
</div>

<!-- SCREEN 2: UPLOAD -->
<div id="upload" class="screen">
  <div class="upload-header">
    <div class="header-title">Dutch Reader</div>
    <button class="settings-btn" id="change-key">Key</button>
  </div>

  <div class="upload-body">
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*">
      <div class="drop-icon">&#x1F4F7;</div>
      <div class="drop-label">Screenshot a page</div>
      <div class="drop-sub">Tap to choose a photo from your camera roll, or take a new one</div>
    </div>

    <div class="preview-wrap" id="preview-wrap">
      <img class="preview-img" id="preview-img" src="" alt="Preview">
      <div class="preview-name" id="preview-name"></div>
    </div>

    <div id="upload-error" class="error-msg" style="display:none;"></div>

    <div class="upload-actions">
      <button class="btn-primary" id="analyse-btn" disabled>Analyse Page</button>
      <button class="btn-secondary" id="clear-btn" style="display:none;">Clear</button>
    </div>
  </div>
</div>

<!-- SCREEN 3: PROCESSING -->
<div id="processing" class="screen">
  <div class="processing-animation">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="processing-label">Reading your page</div>
  <div class="processing-step" id="processing-step">Extracting sentences...</div>
</div>

<!-- SCREEN 4: READER -->
<div id="reader" class="screen">
  <div class="reader-header">
    <div class="reader-count" id="reader-count">1 / 1</div>
    <div class="reader-title">Lees &amp; Leer</div>
    <button class="upload-new-btn" id="upload-new">New page</button>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="sentence-area" id="sentence-area">
    <!-- populated by JS -->
  </div>

  <div class="nav-bar visible" id="nav-bar">
    <button class="nav-btn nav-prev" id="nav-prev">Prev</button>
    <button class="nav-btn nav-next" id="nav-next">Next</button>
  </div>
</div>

<script>
// =====================================================================
// STATE
// =====================================================================
let apiKey = '';
let sentences = [];
let currentIndex = 0;
let selectedFile = null;

// =====================================================================
// SCREEN MANAGEMENT
// =====================================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// =====================================================================
// SETUP SCREEN
// =====================================================================
const savedKey = localStorage.getItem('dutch_reader_key');
if (savedKey) {
  document.getElementById('api-key-input').value = savedKey;
  apiKey = savedKey;
}

document.getElementById('setup-continue').addEventListener('click', () => {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-ant-') && !val.startsWith('sk-')) {
    alert('Please enter a valid Anthropic API key (starts with sk-ant-)');
    return;
  }
  apiKey = val;
  localStorage.setItem('dutch_reader_key', val);
  showScreen('upload');
});

document.getElementById('change-key').addEventListener('click', () => {
  showScreen('setup');
});

// Check if key already saved and valid, go straight to upload
if (savedKey) showScreen('upload');

// =====================================================================
// UPLOAD SCREEN
// =====================================================================
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});

dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFile(file);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) handleFile(fileInput.files[0]);
});

function handleFile(file) {
  selectedFile = file;
  const url = URL.createObjectURL(file);
  document.getElementById('preview-img').src = url;
  document.getElementById('preview-name').textContent = file.name;
  document.getElementById('preview-wrap').classList.add('visible');
  document.getElementById('drop-zone').style.display = 'none';
  document.getElementById('analyse-btn').disabled = false;
  document.getElementById('clear-btn').style.display = 'block';
  document.getElementById('upload-error').style.display = 'none';
}

document.getElementById('clear-btn').addEventListener('click', () => {
  selectedFile = null;
  fileInput.value = '';
  document.getElementById('preview-wrap').classList.remove('visible');
  document.getElementById('drop-zone').style.display = 'flex';
  document.getElementById('analyse-btn').disabled = true;
  document.getElementById('clear-btn').style.display = 'none';
});

document.getElementById('upload-new').addEventListener('click', () => {
  selectedFile = null;
  fileInput.value = '';
  document.getElementById('preview-wrap').classList.remove('visible');
  document.getElementById('drop-zone').style.display = 'flex';
  document.getElementById('analyse-btn').disabled = true;
  document.getElementById('clear-btn').style.display = 'none';
  document.getElementById('upload-error').style.display = 'none';
  showScreen('upload');
});

document.getElementById('analyse-btn').addEventListener('click', analyseImage);

// =====================================================================
// ANALYSE IMAGE
// =====================================================================
async function analyseImage() {
  if (!selectedFile) return;
  showScreen('processing');
  setProcessingStep('Reading the page...');

  try {
    const base64 = await fileToBase64(selectedFile);
    const mediaType = selectedFile.type || 'image/jpeg';

    setProcessingStep('Identifying Dutch sentences...');

    const prompt = `You are a Dutch language tutor. The image shows a page from a Dutch book or text.

Please extract all readable Dutch sentences from the image and for each sentence provide:
1. The original Dutch sentence
2. A natural English translation  
3. A word-by-word or phrase-by-phrase breakdown (each key word/phrase with its English meaning and a very brief grammar note if helpful, e.g. "de (definite article)", "loopt (to walk, 3rd person singular present)", "mooie (beautiful, adjective)")
4. One grammar insight about the sentence structure that helps a learner

Respond ONLY with valid JSON in exactly this format, no other text:
{
  "sentences": [
    {
      "dutch": "De hond loopt in het park.",
      "english": "The dog walks in the park.",
      "words": [
        { "dutch": "De", "english": "the", "note": "definite article (de-word)" },
        { "dutch": "hond", "english": "dog", "note": "noun (de hond)" },
        { "dutch": "loopt", "english": "walks", "note": "lopen, 3rd person singular" },
        { "dutch": "in", "english": "in", "note": "preposition" },
        { "dutch": "het park", "english": "the park", "note": "definite article (het-word)" }
      ],
      "grammar": "Dutch word order: Subject (De hond) + Verb (loopt) + Location (in het park). The verb comes second in main clauses."
    }
  ]
}`;

    setProcessingStep('Translating & analysing...');

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 4000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: {
                type: 'base64',
                media_type: mediaType,
                data: base64
              }
            },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    const text = data.content.map(b => b.text || '').join('');

    setProcessingStep('Building your reader...');

    // Parse JSON - strip any markdown fences
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    if (!parsed.sentences || parsed.sentences.length === 0) {
      throw new Error('No Dutch sentences found in the image. Try a clearer photo.');
    }

    sentences = parsed.sentences;
    currentIndex = 0;

    renderSentence(currentIndex);
    showScreen('reader');

  } catch (err) {
    showScreen('upload');
    const errEl = document.getElementById('upload-error');
    errEl.textContent = 'Error: ' + err.message;
    errEl.style.display = 'block';
  }
}

function setProcessingStep(text) {
  document.getElementById('processing-step').textContent = text;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// =====================================================================
// READER
// =====================================================================
function renderSentence(index) {
  const s = sentences[index];
  const total = sentences.length;

  document.getElementById('reader-count').textContent = `${index + 1} / ${total}`;

  const fill = ((index + 1) / total) * 100;
  document.getElementById('progress-fill').style.width = fill + '%';

  // Nav buttons
  const prevBtn = document.getElementById('nav-prev');
  const nextBtn = document.getElementById('nav-next');
  prevBtn.disabled = index === 0;
  prevBtn.style.opacity = index === 0 ? '0.3' : '1';

  if (index === total - 1) {
    nextBtn.textContent = 'Finish';
    nextBtn.disabled = true;
  } else {
    nextBtn.textContent = 'Next';
    nextBtn.disabled = false;
  }

  // Build sentence HTML
  const area = document.getElementById('sentence-area');
  area.innerHTML = '';

  // English card
  const engCard = document.createElement('div');
  engCard.className = 'card fade-up fade-up-delay-1';
  engCard.innerHTML = `
    <div class="card-lang">English</div>
    <div class="card-flag"></div>
    <div class="card-text">${escHtml(s.english)}</div>
  `;
  area.appendChild(engCard);

  // Dutch card
  const dutchCard = document.createElement('div');
  dutchCard.className = 'card dutch-card fade-up fade-up-delay-2';
  dutchCard.innerHTML = `
    <div class="card-lang">Nederlands</div>
    <div class="card-flag"></div>
    <div class="card-text">${escHtml(s.dutch)}</div>
  `;
  area.appendChild(dutchCard);

  // Listen button
  const listenBtn = document.createElement('button');
  listenBtn.className = 'listen-btn fade-up fade-up-delay-3';
  listenBtn.id = 'listen-btn';
  listenBtn.innerHTML = `<span class="listen-icon">&#9654;</span> Listen in Dutch`;
  listenBtn.addEventListener('click', () => speakDutch(s.dutch, listenBtn));
  area.appendChild(listenBtn);

  // Breakdown toggle
  const breakdownToggle = document.createElement('div');
  breakdownToggle.className = 'breakdown-toggle fade-up fade-up-delay-3';
  breakdownToggle.innerHTML = `
    <span class="breakdown-toggle-label">Word breakdown</span>
    <span class="breakdown-arrow" id="breakdown-arrow">&#9660;</span>
  `;
  area.appendChild(breakdownToggle);

  const breakdownBody = document.createElement('div');
  breakdownBody.className = 'breakdown-body';
  breakdownBody.id = 'breakdown-body';

  if (s.words && s.words.length > 0) {
    s.words.forEach(w => {
      const row = document.createElement('div');
      row.className = 'word-row';
      row.innerHTML = `
        <div class="word-dutch">${escHtml(w.dutch)}</div>
        <div class="word-info">
          <div class="word-english">${escHtml(w.english)}</div>
          ${w.note ? `<div class="word-note">${escHtml(w.note)}</div>` : ''}
        </div>
      `;
      breakdownBody.appendChild(row);
    });
  }
  area.appendChild(breakdownBody);

  breakdownToggle.addEventListener('click', () => {
    const body = document.getElementById('breakdown-body');
    const arrow = document.getElementById('breakdown-arrow');
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    arrow.classList.toggle('open', !isOpen);
  });

  // Grammar card
  if (s.grammar) {
    const grammarCard = document.createElement('div');
    grammarCard.className = 'grammar-card fade-up fade-up-delay-4';
    grammarCard.innerHTML = `
      <div class="grammar-label">Grammar insight</div>
      <div class="grammar-text">${escHtml(s.grammar)}</div>
    `;
    area.appendChild(grammarCard);
  }

  area.scrollTo(0, 0);
}

// =====================================================================
// TEXT TO SPEECH
// =====================================================================
function speakDutch(text, btn) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();

    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'nl-NL';
    utt.rate = 0.85;

    // Try to find a Dutch voice
    const voices = window.speechSynthesis.getVoices();
    const dutchVoice = voices.find(v => v.lang.startsWith('nl'));
    if (dutchVoice) utt.voice = dutchVoice;

    btn.classList.add('speaking');
    btn.innerHTML = `<span class="listen-icon">&#9646;&#9646;</span> Speaking...`;

    utt.onend = () => {
      btn.classList.remove('speaking');
      btn.innerHTML = `<span class="listen-icon">&#9654;</span> Listen again`;
    };

    utt.onerror = () => {
      btn.classList.remove('speaking');
      btn.innerHTML = `<span class="listen-icon">&#9654;</span> Listen in Dutch`;
    };

    window.speechSynthesis.speak(utt);
  } else {
    alert('Text-to-speech is not supported in this browser. Try Chrome on Android.');
  }
}

// Load voices early (some browsers need this)
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.addEventListener('voiceschanged', () => {
    window.speechSynthesis.getVoices();
  });
}

// =====================================================================
// NAV
// =====================================================================
document.getElementById('nav-prev').addEventListener('click', () => {
  if (currentIndex > 0) {
    currentIndex--;
    renderSentence(currentIndex);
  }
});

document.getElementById('nav-next').addEventListener('click', () => {
  if (currentIndex < sentences.length - 1) {
    currentIndex++;
    renderSentence(currentIndex);
  }
});

// =====================================================================
// UTILS
// =====================================================================
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  const swContent = `

});
